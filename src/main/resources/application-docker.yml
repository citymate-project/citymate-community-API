# ============================================
# CITYMATE COMMUNITY API - Configuration DOCKER
# ============================================

server:
  port: 8083

spring:
  application:
    name: community-api

  jersey:
    type: filter
    application-path: /api/v1

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://community-db:5432/community_db}
    username: ${SPRING_DATASOURCE_USERNAME:citymate_community}
    password: ${SPRING_DATASOURCE_PASSWORD:community_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:Cm2K9#xP7!vQ2@wR4eT6^yU8&iO0*aS1-dF3+gH5_jL9(kM2)nB4}

logging:
  level:
    root: INFO
    com.citymate.community: INFO
